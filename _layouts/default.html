<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ title }} · Volkman Farm</title>
    <meta name="description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro, including Lake Mary, Sanford, Winter Park, Oviedo, and more. Ten varieties, organic seeds, harvested the morning of delivery.' }}">
    <link rel="canonical" href="https://volkman.farm{{ page.url }}">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Volkman Farm">
    <meta property="og:title" content="{{ title }} · Volkman Farm">
    <meta property="og:description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro.' }}">
    <meta property="og:url" content="https://volkman.farm{{ page.url }}">
    <meta property="og:image" content="https://volkman.farm/assets/brand/volkman-mark-1200.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} · Volkman Farm">
    <meta name="twitter:description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro.' }}">
    <meta name="twitter:image" content="https://volkman.farm/assets/brand/volkman-mark-1200.png">
    <link rel="icon" href="/assets/brand/monogram.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/brand/monogram-180.png">
    <link rel="preload" href="/assets/fonts/bely-display.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/source-serif-4-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/css/main.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9VGXS7B383"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9VGXS7B383');
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://volkman.farm/#business",
      "name": "Volkman Farm",
      "description": "Family-run microgreens farm delivering weekly across the Orlando metro area.",
      "image": "https://volkman.farm/assets/brand/volkman-mark-1200.png",
      "logo": "https://volkman.farm/assets/brand/volkman-mark-1200.png",
      "url": "https://volkman.farm",
      "email": "micros@volkman.farm",
      "priceRange": "$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Sanford",
        "addressRegion": "FL",
        "addressCountry": "US"
      },
      "areaServed": [
        {"@type": "City", "name": "Lake Mary"},
        {"@type": "City", "name": "Sanford"},
        {"@type": "City", "name": "Winter Springs"},
        {"@type": "City", "name": "Oviedo"},
        {"@type": "City", "name": "Casselberry"},
        {"@type": "City", "name": "Maitland"},
        {"@type": "City", "name": "Winter Park"},
        {"@type": "Place", "name": "College Park, Orlando"},
        {"@type": "Place", "name": "Downtown Orlando"}
      ],
      "makesOffer": {
        "@type": "Offer",
        "priceCurrency": "USD",
        "price": "3.50",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "3.50",
          "priceCurrency": "USD",
          "unitText": "ounce"
        },
        "itemOffered": {
          "@type": "Product",
          "name": "Fresh Microgreens",
          "category": "Food"
        }
      }
    }
    </script>
  </head>
  <body{% if page.url == "/restaurants/" %} data-page="wholesale"{% endif %}>
    <main>
      <header class="site-header">
        <a class="site-header__home" href="/" aria-label="Volkman Farm home">
          <svg class="site-header__monogram" viewBox="0 0 64 64" fill="none" aria-hidden="true" focusable="false">
            <!-- Laurel-wreathed V monogram. Alpine green via currentColor. -->
            <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.35"/>
            <path d="M19 22 L32 48 L45 22" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Left laurel -->
            <path d="M14 30 C 14 26, 12 23, 9 22"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M14 34 C 14 38, 12 41, 9 42"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M16 27 C 16 24, 14 22, 12 21" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
            <path d="M16 37 C 16 40, 14 42, 12 43" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
            <!-- Right laurel -->
            <path d="M50 30 C 50 26, 52 23, 55 22"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M50 34 C 50 38, 52 41, 55 42"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            <path d="M48 27 C 48 24, 50 22, 52 21"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
            <path d="M48 37 C 48 40, 50 42, 52 43"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          </svg>
          <img class="site-header__wordmark" src="/assets/brand/wordmark.svg" alt="Volkman Farm" width="280" height="48"
               onerror="this.onerror=null;this.src='/assets/brand/volkman-mark-600.png';this.style.height='64px';">
        </a>
      </header>
      <nav aria-label="Primary">
        <ul>
          <li><a href="/microgreens/"{% if page.url == "/microgreens/" %} aria-current="page"{% endif %}>microgreens</a></li>
          <li><a href="/greens/"{% if page.url == "/greens/" %} aria-current="page"{% endif %}>greens</a></li>
          <li><a href="/delivery/"{% if page.url == "/delivery/" %} aria-current="page"{% endif %}>delivery</a></li>
          <li><a href="/pricing/"{% if page.url == "/pricing/" %} aria-current="page"{% endif %}>pricing</a></li>
          <li><a href="/about/"{% if page.url == "/about/" %} aria-current="page"{% endif %}>about</a></li>
        </ul>
      </nav>
      <h1>{{ title }}</h1>
      {{ content }}
      <footer>
        <svg class="monogram" viewBox="0 0 64 64" fill="none" aria-hidden="true" focusable="false">
          <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.35"/>
          <path d="M19 22 L32 48 L45 22" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M14 30 C 14 26, 12 23, 9 22"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M14 34 C 14 38, 12 41, 9 42"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M16 27 C 16 24, 14 22, 12 21" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <path d="M16 37 C 16 40, 14 42, 12 43" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <path d="M50 30 C 50 26, 52 23, 55 22"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M50 34 C 50 38, 52 41, 55 42"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M48 27 C 48 24, 50 22, 52 21"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <path d="M48 37 C 48 40, 50 42, 52 43"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        </svg>
        <ul>
          <li><a href="/subscribe/">subscribe &amp; save</a></li>
          <li><a href="/restaurants/">for chefs</a></li>
          <li><a href="mailto:micros@volkman.farm">micros@volkman.farm</a></li>
        </ul>
        <p>Volkman Farm · Sanford, FL · family-grown microgreens</p>
      </footer>
    </main>
  </body>
</html>
