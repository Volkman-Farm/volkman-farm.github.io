<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ title }} · Volkman Farm</title>
    <meta name="description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro, including Lake Mary, Sanford, Winter Park, Oviedo, and more. Ten varieties, organic seeds, harvested the morning of delivery.' }}">
    <link rel="canonical" href="https://volkman.farm{{ page.url }}">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Volkman Farm">
    <meta property="og:title" content="{{ title }} · Volkman Farm">
    <meta property="og:description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro.' }}">
    <meta property="og:url" content="https://volkman.farm{{ page.url }}">
    <meta property="og:image" content="https://volkman.farm/assets/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} · Volkman Farm">
    <meta name="twitter:description" content="{{ description | default: 'Family-grown microgreens hand-delivered weekly across the Orlando metro.' }}">
    <meta name="twitter:image" content="https://volkman.farm/assets/logo.png">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9VGXS7B383"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9VGXS7B383');
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://volkman.farm/#business",
      "name": "Volkman Farm",
      "description": "Family-run microgreens farm delivering weekly across the Orlando metro area.",
      "image": "https://volkman.farm/assets/logo.png",
      "logo": "https://volkman.farm/assets/logo.png",
      "url": "https://volkman.farm",
      "email": "micros@volkman.farm",
      "priceRange": "$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Sanford",
        "addressRegion": "FL",
        "addressCountry": "US"
      },
      "areaServed": [
        {"@type": "City", "name": "Lake Mary"},
        {"@type": "City", "name": "Sanford"},
        {"@type": "City", "name": "Winter Springs"},
        {"@type": "City", "name": "Oviedo"},
        {"@type": "City", "name": "Casselberry"},
        {"@type": "City", "name": "Maitland"},
        {"@type": "City", "name": "Winter Park"},
        {"@type": "Place", "name": "College Park, Orlando"},
        {"@type": "Place", "name": "Downtown Orlando"}
      ],
      "makesOffer": {
        "@type": "Offer",
        "priceCurrency": "USD",
        "price": "3.50",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "3.50",
          "priceCurrency": "USD",
          "unitText": "ounce"
        },
        "itemOffered": {
          "@type": "Product",
          "name": "Fresh Microgreens",
          "category": "Food"
        }
      }
    }
    </script>
    <style>
      :root {
        --cream: #fef6e9;
        --cream-shadow: #f0e6d0;
        --ink: #2b2418;
        --sprout: #5c7a3a;
        --sprout-dark: #455c2b;
        --radish: #c2563a;
        --mono: 'Courier New', Courier, monospace;
        --serif: Georgia, 'Times New Roman', serif;
      }
      * { box-sizing: border-box; }
      html { background-color: var(--cream); }
      body {
        color: var(--ink);
        font-family: var(--mono);
        line-height: 1.6;
        margin: 0;
        padding: 0 16px 64px;
      }
      h1, h2, h3 {
        font-family: var(--serif);
        font-weight: 600;
        text-align: center;
        line-height: 1.2;
        width: min(60ch, 92%);
        margin-left: auto;
        margin-right: auto;
      }
      h1 { font-size: clamp(1.75rem, 5vw, 2.75rem); margin: 24px auto 8px; }
      h2 { font-size: clamp(1.25rem, 3.5vw, 1.75rem); margin: 48px auto 8px; }
      h3 { font-size: clamp(1.05rem, 2.5vw, 1.25rem); margin: 32px auto 4px; }
      p {
        font-family: var(--mono);
        width: min(60ch, 92%);
        margin: 16px auto;
      }
      a { color: var(--sprout-dark); text-underline-offset: 4px; }
      a:hover { color: var(--radish); }
      nav ul {
        list-style: none;
        padding: 0;
        margin: 16px auto 32px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px 4px;
      }
      nav ul li { display: inline-flex; align-items: center; }
      nav ul li:not(:first-child):before {
        content: "·";
        margin: 0 12px;
        color: var(--sprout);
      }
      nav ul li a {
        color: var(--ink);
        font-family: var(--mono);
        text-decoration: underline;
        text-underline-offset: 8px;
      }
      nav ul li a:hover { color: var(--sprout-dark); }
      #logo {
        display: block;
        margin: 40px auto 8px;
        width: min(55%, 220px);
        height: auto;
      }
      input, select, textarea {
        font-family: var(--mono);
        font-size: 1.125rem;
        padding: 10px 12px;
        background: var(--cream-shadow);
        border: 2px solid var(--ink);
        border-radius: 0;
        width: min(60ch, 92%);
        display: block;
        margin: 8px auto;
        color: var(--ink);
      }
      input:focus, select:focus, textarea:focus {
        outline: 3px solid var(--sprout);
        outline-offset: 2px;
      }
      input[type="checkbox"] {
        width: auto;
        display: inline-block;
        transform: scale(1.4);
        margin: 0 8px 0 0;
        vertical-align: middle;
      }
      input[type="submit"] {
        background: var(--sprout);
        color: var(--cream);
        border-color: var(--sprout);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        padding: 14px 28px;
        font-weight: 700;
        width: auto;
        min-width: 220px;
      }
      input[type="submit"]:hover {
        background: var(--ink);
        border-color: var(--ink);
      }
      form p label { vertical-align: middle; }
      .cta-row { text-align: center; margin: 24px auto; width: min(60ch, 92%); }
      .cta-row a { font-weight: 700; }
      table { width: min(60ch, 92%); }
      main > ul, main > ol {
        font-family: var(--mono);
        width: min(60ch, 92%);
        margin: 16px auto;
        padding-left: 24px;
        line-height: 1.6;
      }
      main > ul li, main > ol li { margin: 6px 0; }
      main > hr {
        width: min(60ch, 92%);
        margin: 40px auto;
        border: 0;
        border-top: 1px solid var(--ink);
        opacity: 0.25;
      }
      blockquote {
        font-family: var(--serif);
        font-style: italic;
        font-size: 1.125rem;
        width: min(60ch, 88%);
        margin: 24px auto;
        padding: 8px 24px;
        border-left: 4px solid var(--sprout);
        color: var(--ink);
      }
      footer {
        margin: 80px auto 0;
        padding-top: 32px;
        width: min(60ch, 92%);
        border-top: 1px solid var(--ink);
        opacity: 0.85;
        text-align: center;
      }
      footer ul {
        list-style: none;
        padding: 0;
        margin: 0 auto 12px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 4px;
      }
      footer ul li { display: inline-flex; align-items: center; font-family: var(--mono); font-size: 0.95rem; }
      footer ul li:not(:first-child):before {
        content: "·";
        margin: 0 10px;
        color: var(--sprout);
      }
      footer ul li a {
        color: var(--ink);
        text-decoration: underline;
        text-underline-offset: 6px;
      }
      footer p {
        font-size: 0.85rem;
        margin: 8px auto 0;
        color: var(--ink);
        opacity: 0.7;
      }
      @media (max-width: 720px) {
        body { padding: 0 12px 48px; }
        #logo { width: 60%; margin-top: 24px; }
        p, input, select, textarea, table, blockquote { width: 96%; }
        main > ul, main > ol, main > hr { width: 96%; }
        h1 { margin-top: 12px; }
        nav ul li:not(:first-child):before { margin: 0 6px; }
      }
    </style>
  </head>
  <body>
    <main>
      <a href="/" aria-label="Volkman Farm home"><img id="logo" src="/assets/logo.webp" alt="Volkman Farm, Orlando-area microgreens"></a>
      <nav aria-label="Primary">
        <ul>
          <li><a href="/microgreens/">microgreens</a></li>
          <li><a href="/greens/">greens</a></li>
          <li><a href="/delivery/">delivery</a></li>
          <li><a href="/pricing/">pricing</a></li>
          <li><a href="/about/">about</a></li>
        </ul>
      </nav>
      <h1>{{ title }}</h1>
      {{ content }}
      <footer>
        <ul>
          <li><a href="/subscribe/">subscribe &amp; save</a></li>
          <li><a href="/restaurants/">for chefs</a></li>
          <li><a href="mailto:micros@volkman.farm">micros@volkman.farm</a></li>
        </ul>
        <p>Volkman Farm · Sanford, FL · family-grown microgreens</p>
      </footer>
    </main>
  </body>
</html>
