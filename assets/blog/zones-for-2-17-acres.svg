<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Line drawing of a house at the edge of concentric rings, with a shed on the nearest ring, a chicken further out, a planted mound beyond that, and wild grass at the far edge">
  <rect width="1200" height="630" fill="#f5ead3"/>

  <g fill="none" stroke="#3a5a2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

    <!-- sun, upper right, out past the last ring -->
    <g stroke="#8a7e3a">
      <circle cx="1108" cy="76" r="28"/>
      <path d="M1108 30 V 18"/>
      <path d="M1108 122 V 134"/>
      <path d="M1062 76 H 1050"/>
      <path d="M1154 76 H 1166"/>
      <path d="M1076 44 L 1067 35"/>
      <path d="M1140 44 L 1149 35"/>
      <path d="M1076 108 L 1067 117"/>
      <path d="M1140 108 L 1149 117"/>
    </g>

    <!-- the attention rings, radiating from the house -->
    <g stroke-width="4" stroke-dasharray="14 12">
      <path d="M199 98 A 230 230 0 0 1 199 542"/>
      <path d="M469 44 A 430 430 0 0 1 469 596"/>
      <path d="M720 50 A 640 640 0 0 1 720 590"/>
      <path d="M981 63 A 880 880 0 0 1 981 577"/>
    </g>

    <!-- zone 0: the house -->
    <g stroke="#1f2419">
      <path d="M65 400 V 265 L 140 205 L 215 265 V 400 Z"/>
      <path d="M118 400 v -58 h 44 v 58"/>
      <path d="M82 292 h 36 v 36 h -36 Z" stroke-width="4"/>
      <path d="M100 292 v 36 M82 310 h 36" stroke-width="3"/>
    </g>

    <!-- footprints from the back door toward the shed, paired left and right -->
    <g stroke="#5c4633" stroke-width="4">
      <path d="M243 302 l 9 -4"/>
      <path d="M259 281 l 9 -4"/>
      <path d="M287 284 l 9 -4"/>
      <path d="M303 263 l 9 -4"/>
      <path d="M331 266 l 9 -4"/>
      <path d="M347 245 l 9 -4"/>
    </g>

    <!-- zone 1: the grow shed, low and wide -->
    <g stroke="#5c4633">
      <path d="M375 262 V 195 L 437 158 L 500 195 V 262 Z"/>
      <path d="M420 262 v -40 h 35 v 40"/>
      <circle cx="437" cy="188" r="7" stroke-width="4"/>
    </g>

    <!-- zone 1, shared: the chicken -->
    <g>
      <path d="M395 495 c -2 -20 12 -38 34 -38 c 16 0 26 10 30 22 c 3 10 0 22 -10 29 c -14 10 -44 8 -54 -13 z"/>
      <path d="M398 486 c -10 -8 -14 -18 -12 -28 M407 480 c -8 -10 -10 -20 -7 -30"/>
      <path d="M459 479 c 8 -4 12 -12 12 -20 c 0 -9 -7 -16 -15 -16 c -8 0 -14 6 -15 14"/>
      <path d="M471 455 l 12 4 l -12 5" stroke-width="4"/>
      <circle cx="460" cy="452" r="2.5" fill="#3a5a2a" stroke="none"/>
      <path d="M420 510 v 15 m -8 0 h 16 M440 510 v 15 m -8 0 h 16" stroke-width="4"/>
      <path d="M450 441 c 2 -6 7 -9 12 -8 c -1 -5 3 -9 8 -9" stroke="#6b2a2f" stroke-width="4"/>
    </g>

    <!-- zone 2: the food forest mounds -->
    <g>
      <ellipse cx="656" cy="252" rx="88" ry="54" stroke="#5c4633"/>
      <ellipse cx="656" cy="252" rx="50" ry="29" stroke="#5c4633" stroke-width="4"/>
      <path d="M656 266 v -30 M656 247 c -9 -10 -19 -11 -25 -7 M656 247 c 9 -10 19 -11 25 -7" stroke-width="4"/>
    </g>
    <g>
      <ellipse cx="655" cy="473" rx="76" ry="47" stroke="#5c4633"/>
      <ellipse cx="655" cy="473" rx="43" ry="25" stroke="#5c4633" stroke-width="4"/>
      <path d="M655 485 v -25 M655 469 c -8 -9 -17 -10 -22 -6 M655 469 c 8 -9 17 -10 22 -6" stroke-width="4"/>
    </g>

    <!-- zone 5: the wild edge, past the last ring -->
    <g stroke="#8a7e3a" stroke-width="4">
      <path d="M1062 232 c 0 -14 -4 -24 -12 -30 M1062 232 c 0 -16 2 -26 10 -34 M1062 232 c 3 -12 9 -20 17 -24"/>
      <path d="M1122 372 c 0 -14 -4 -24 -12 -30 M1122 372 c 0 -16 2 -26 10 -34 M1122 372 c 3 -12 9 -20 17 -24"/>
      <path d="M1066 512 c 0 -14 -4 -24 -12 -30 M1066 512 c 0 -16 2 -26 10 -34 M1066 512 c 3 -12 9 -20 17 -24"/>
      <path d="M1160 500 c 0 -12 -3 -20 -10 -25 M1160 500 c 0 -13 2 -22 8 -28"/>
    </g>
  </g>
</svg>
