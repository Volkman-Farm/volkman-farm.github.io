<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Line drawing cross-section of a spade stuck upright in pale sandy ground, a tipped watering can pouring from its rose into a shallow hole, and dashed lines showing the water draining straight down and vanishing">
  <rect width="1200" height="630" fill="#f5ead3"/>

  <!-- sand grains scattered through the ground -->
  <g fill="#5c4633" stroke="none">
    <circle cx="150" cy="392" r="4"/>
    <circle cx="215" cy="440" r="3"/>
    <circle cx="120" cy="470" r="3"/>
    <circle cx="185" cy="352" r="3"/>
    <circle cx="330" cy="470" r="4"/>
    <circle cx="380" cy="410" r="3"/>
    <circle cx="425" cy="470" r="3"/>
    <circle cx="470" cy="405" r="4"/>
    <circle cx="520" cy="455" r="3"/>
    <circle cx="360" cy="520" r="3"/>
    <circle cx="210" cy="525" r="4"/>
    <circle cx="450" cy="515" r="3"/>
    <circle cx="560" cy="500" r="3"/>
    <circle cx="600" cy="440" r="4"/>
    <circle cx="820" cy="470" r="3"/>
    <circle cx="880" cy="420" r="4"/>
    <circle cx="940" cy="475" r="3"/>
    <circle cx="1000" cy="415" r="3"/>
    <circle cx="1055" cy="465" r="4"/>
    <circle cx="900" cy="525" r="3"/>
    <circle cx="990" cy="525" r="3"/>
    <circle cx="1080" cy="520" r="3"/>
    <circle cx="770" cy="520" r="4"/>
    <circle cx="850" cy="360" r="3"/>
    <circle cx="1030" cy="360" r="3"/>
  </g>

  <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

    <!-- sun, upper right, the heat that burns organic matter off -->
    <g stroke="#8a7e3a">
      <circle cx="1080" cy="80" r="30"/>
      <path d="M1080 30 V 18"/>
      <path d="M1080 130 V 142"/>
      <path d="M1030 80 H 1018"/>
      <path d="M1130 80 H 1142"/>
      <path d="M1045 45 L 1036 36"/>
      <path d="M1115 45 L 1124 36"/>
      <path d="M1045 115 L 1036 124"/>
      <path d="M1115 115 L 1124 124"/>
    </g>

    <!-- ground surface, with a shallow hole dug in the middle -->
    <path d="M60 330 H 545 C 580 330 590 372 640 372 C 690 372 700 330 735 330 H 1140" stroke="#5c4633"/>

    <!-- the spade, thrust straight down into the sand on the left -->
    <g stroke="#1f2419">
      <!-- shaft, dead vertical -->
      <path d="M280 108 V 344"/>
      <!-- D-grip on top -->
      <path d="M280 108 L 262 78 C 257 55 303 55 298 78 L 280 108 Z"/>
      <!-- blade, a spade centered on the shaft, below the surface -->
      <path d="M252 344 L 308 344 L 308 398 L 280 430 L 252 398 Z"/>
    </g>

    <!-- the watering can, canonical shape tipped forward to pour -->
    <g stroke="#1f2419" transform="translate(832,122) rotate(-38)">
      <!-- body: trapezoid wider at the top -->
      <path d="M-56 -52 L 56 -52 L 44 60 L -44 60 Z"/>
      <!-- open top lip -->
      <ellipse cx="0" cy="-52" rx="56" ry="9"/>
      <!-- big loop handle on the back -->
      <path d="M40 -56 C 90 -66 104 -30 96 -2 C 92 14 66 16 48 12"/>
      <!-- spout on the left, tapering to the rose -->
      <path d="M-46 4 L -126 20"/>
      <path d="M-44 40 L -122 38"/>
      <!-- flared triangular rose at the spout tip -->
      <path d="M-126 18 L -168 2 L -150 54 L -122 40 Z"/>
    </g>

    <!-- water pouring from the rose into the hole -->
    <g stroke="#3a5a2a" stroke-dasharray="12 10" stroke-width="4">
      <path d="M712 248 C 696 290 664 332 646 366"/>
    </g>

    <!-- water draining straight down and vanishing into the sand -->
    <g stroke="#3a5a2a" stroke-dasharray="10 12" stroke-width="4">
      <path d="M612 384 V 500"/>
      <path d="M648 388 V 540"/>
      <path d="M686 384 V 470"/>
      <path d="M722 380 V 512"/>
    </g>
    <!-- arrowheads on the draining water -->
    <g stroke="#3a5a2a" stroke-width="4">
      <path d="M612 500 l -9 -13 m 9 13 l 9 -13"/>
      <path d="M648 540 l -9 -13 m 9 13 l 9 -13"/>
      <path d="M722 512 l -9 -13 m 9 13 l 9 -13"/>
    </g>

  </g>
</svg>
